  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"pt-BR\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Diggy — Cadastro de produto<\u002Ftitle>\n\n\n<style>\n  /* ---------- tokens ---------- */\n  :root {\n    --pink: #F0185A;\n    --pink-soft: #FFF5F8;\n    --pink-badge-bg: #FEE2EE;\n    --green: #22C55E;\n    --green-bg: #F0FFF4;\n    --green-border: #BBF7D0;\n    --green-fg: #15803D;\n    --ink: #111111;\n    --ink-2: #6B7280;\n    --ink-3: #9CA3AF;\n    --line: #E5E7EB;\n    --line-2: #D1D5DB;\n    --surface: #F5F5F5;\n    --bg-photo-empty: #F0F0F0;\n    --bezel: #1A1A1A;\n    --font: -apple-system, BlinkMacSystemFont, \"SF Pro Display\", \"SF Pro Text\", system-ui, sans-serif;\n  }\n\n  /* ---------- page ---------- */\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  [hidden] { display: none !important; }\n  body {\n    font-family: var(--font);\n    background: #F0F0F0;\n    color: var(--ink);\n    min-height: 100vh;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    padding: 24px 16px;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  /* ---------- phone frame ---------- */\n  .phone {\n    width: 100%;\n    max-width: 390px;\n    height: 844px;\n    max-height: calc(100vh - 48px);\n    border-radius: 40px;\n    border: 8px solid var(--bezel);\n    background: #fff;\n    overflow: hidden;\n    position: relative;\n    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.25), 0 10px 30px -10px rgba(0,0,0,0.1);\n  }\n  .phone-inner {\n    position: relative;\n    height: 100%;\n    width: 100%;\n    overflow: hidden;\n  }\n\n  /* ---------- screens ---------- */\n  .screen {\n    position: absolute;\n    inset: 0;\n    display: none;\n    flex-direction: column;\n    background: #fff;\n  }\n  .screen.is-active { display: flex; }\n\n  /* ---------- status bar ---------- */\n  .status-bar {\n    height: 44px;\n    padding: 0 24px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    font-size: 14px;\n    font-weight: 600;\n    color: var(--ink);\n    flex-shrink: 0;\n  }\n  .status-bar .right { display: flex; gap: 5px; align-items: center; }\n\n  /* ---------- header ---------- */\n  .header {\n    height: 56px;\n    display: flex;\n    align-items: center;\n    gap: 4px;\n    padding: 0 12px;\n    flex-shrink: 0;\n  }\n  .header button.back {\n    width: 40px; height: 40px;\n    border: 0; background: transparent;\n    display: grid; place-items: center;\n    border-radius: 50%;\n    cursor: pointer;\n    color: var(--ink-2);\n  }\n  .header button.back:hover { background: var(--surface); }\n  .header h1 {\n    font-size: 17px;\n    font-weight: 600;\n    margin: 0;\n    color: var(--ink);\n    letter-spacing: -0.01em;\n  }\n\n  /* divider under header / stepper */\n  .divider { height: 1px; background: var(--line); }\n\n  /* ---------- stepper ---------- */\n  .stepper {\n    padding: 18px 24px 16px;\n    display: grid;\n    grid-template-columns: auto 1fr auto 1fr auto;\n    align-items: center;\n    flex-shrink: 0;\n  }\n  .step-node {\n    display: flex; flex-direction: column;\n    align-items: center; gap: 6px;\n    min-width: 56px;\n  }\n  .step-circle {\n    width: 28px; height: 28px;\n    border-radius: 50%;\n    display: grid; place-items: center;\n    font-size: 13px; font-weight: 600;\n    border: 1.5px solid var(--line-2);\n    color: var(--ink-3);\n    background: #fff;\n    flex-shrink: 0;\n  }\n  .step-node.active .step-circle {\n    background: var(--pink);\n    border-color: var(--pink);\n    color: #fff;\n  }\n  .step-node.done .step-circle {\n    background: var(--green);\n    border-color: var(--green);\n    color: #fff;\n  }\n  .step-label {\n    font-size: 12px;\n    color: var(--ink-2);\n    text-align: center;\n    line-height: 1.25;\n  }\n  .step-label small { display: block; color: var(--ink-2); font-size: 11px; }\n  .step-node.active .step-label { color: var(--pink); font-weight: 600; }\n  .step-node.done .step-label { color: var(--ink); }\n  .step-connector {\n    height: 2px;\n    background: var(--line-2);\n    margin: 0 8px;\n    margin-bottom: 22px; /* vertically align with circle row */\n    align-self: center;\n    transform: translateY(-11px);\n  }\n  .step-connector.done { background: var(--green); }\n\n  /* ---------- content ---------- */\n  .content {\n    flex: 1 1 auto;\n    overflow-y: auto;\n    padding: 18px 16px 20px;\n    display: flex;\n    flex-direction: column;\n    gap: 18px;\n    scrollbar-width: thin;\n  }\n  .content::-webkit-scrollbar { width: 4px; }\n  .content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 4px; }\n\n  /* ---------- footer ---------- */\n  .footer {\n    padding: 12px 16px 20px;\n    flex-shrink: 0;\n    background: #fff;\n    border-top: 1px solid transparent;\n    display: flex;\n    gap: 12px;\n  }\n  .footer.with-shadow { box-shadow: 0 -8px 16px -8px rgba(0,0,0,0.04); }\n\n  .btn-primary {\n    width: 100%;\n    background: var(--pink);\n    color: #fff;\n    border: 0;\n    border-radius: 24px;\n    padding: 16px;\n    font-size: 16px;\n    font-weight: 600;\n    font-family: inherit;\n    cursor: pointer;\n    transition: background 0.12s ease, transform 0.05s ease;\n  }\n  .btn-primary:hover { background: #d8154f; }\n  .btn-primary:active { transform: translateY(1px); }\n  .btn-ghost {\n    background: transparent;\n    color: var(--pink);\n    border: 0;\n    border-radius: 24px;\n    padding: 16px;\n    font-size: 16px;\n    font-weight: 600;\n    font-family: inherit;\n    cursor: pointer;\n  }\n  .btn-outline {\n    width: 100%;\n    background: #fff;\n    color: var(--ink);\n    border: 1px solid var(--line);\n    border-radius: 12px;\n    padding: 14px;\n    font-size: 14px;\n    font-weight: 500;\n    font-family: inherit;\n    cursor: pointer;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    gap: 10px;\n    transition: background 0.12s ease;\n  }\n  .btn-outline:hover { background: var(--surface); }\n\n  /* ---------- product image card (tela 1) ---------- */\n  .product-card {\n    background: var(--surface);\n    border-radius: 12px;\n    padding: 12px;\n    display: flex;\n    align-items: center;\n    gap: 12px;\n  }\n  .product-card .thumb {\n    width: 56px; height: 56px;\n    border-radius: 10px;\n    background: #3D1F6B center/cover no-repeat;\n    flex-shrink: 0;\n    overflow: hidden;\n  }\n  .product-card .info { flex: 1; min-width: 0; }\n  .product-card .info .name { font-size: 15px; font-weight: 600; color: var(--ink); }\n  .product-card .info .sub { font-size: 13px; color: var(--ink-2); margin-top: 2px; }\n  .product-card a.swap {\n    color: var(--pink);\n    font-size: 14px;\n    font-weight: 600;\n    text-decoration: none;\n    padding: 6px 4px;\n    cursor: pointer;\n  }\n\n  /* ---------- product chip (telas 2 & 3) ---------- */\n  .product-chip {\n    background: var(--surface);\n    border-radius: 20px;\n    padding: 6px 16px 6px 6px;\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    align-self: flex-start;\n  }\n  .product-chip .thumb {\n    width: 36px; height: 36px;\n    border-radius: 50%;\n    background: #3D1F6B center/cover no-repeat;\n    flex-shrink: 0;\n  }\n  .product-chip .name { font-size: 14px; font-weight: 600; }\n\n  /* ---------- form fields ---------- */\n  .field { display: flex; flex-direction: column; gap: 8px; }\n  .field-label {\n    display: flex; align-items: center; gap: 8px;\n    font-size: 13px;\n    color: var(--ink-2);\n    font-weight: 500;\n  }\n  .badge-req {\n    background: var(--pink-badge-bg);\n    color: var(--pink);\n    font-size: 11px;\n    font-weight: 600;\n    padding: 2px 8px;\n    border-radius: 20px;\n  }\n  .field input,\n  .field textarea {\n    width: 100%;\n    border: 1px solid var(--line);\n    border-radius: 8px;\n    padding: 14px;\n    font-size: 15px;\n    font-family: inherit;\n    color: var(--ink);\n    background: #fff;\n    resize: none;\n    outline: none;\n    transition: border-color 0.12s ease;\n  }\n  .field input:focus,\n  .field textarea:focus { border-color: var(--pink); }\n  .field textarea { min-height: 96px; line-height: 1.45; }\n  .field .counter {\n    font-size: 12px;\n    color: var(--ink-3);\n    text-align: right;\n    margin-top: -4px;\n  }\n\n  /* ---------- toggle row ---------- */\n  .toggle-row {\n    border: 1px solid var(--line);\n    border-radius: 12px;\n    padding: 14px 16px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 12px;\n  }\n  .toggle-row .text .title { font-size: 14px; font-weight: 600; }\n  .toggle-row .text .state { font-size: 13px; color: var(--ink-2); margin-top: 2px; }\n\n  .toggle {\n    --w: 40px;\n    --h: 22px;\n    position: relative;\n    width: var(--w); height: var(--h);\n    border-radius: 999px;\n    background: #E5E7EB;\n    cursor: pointer;\n    transition: background 0.18s ease;\n    flex-shrink: 0;\n  }\n  .toggle::after {\n    content: \"\";\n    position: absolute;\n    top: 2px; left: 2px;\n    width: 18px; height: 18px;\n    background: #fff;\n    border-radius: 50%;\n    box-shadow: 0 1px 2px rgba(0,0,0,0.18);\n    transition: transform 0.18s ease;\n  }\n  .toggle.on { background: var(--green); }\n  .toggle.on::after { transform: translateX(18px); }\n\n  /* ---------- price type grid (tela 2) ---------- */\n  .ptype-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr 1fr;\n    gap: 8px;\n  }\n  .ptype {\n    background: var(--surface);\n    border: 2px solid transparent;\n    border-radius: 12px;\n    padding: 12px 10px;\n    cursor: pointer;\n    display: flex;\n    flex-direction: column;\n    gap: 6px;\n    min-height: 116px;\n    transition: border-color 0.12s ease, background 0.12s ease;\n  }\n  .ptype .icon { color: var(--ink-3); }\n  .ptype .title {\n    font-size: 13px;\n    font-weight: 600;\n    color: var(--ink-2);\n    margin-top: 4px;\n  }\n  .ptype .sub {\n    font-size: 11px;\n    color: var(--ink-3);\n    line-height: 1.35;\n  }\n  .ptype.is-selected {\n    border-color: var(--pink);\n    background: var(--pink-soft);\n  }\n  .ptype.is-selected .icon { color: var(--pink); }\n  .ptype.is-selected .title { color: var(--pink); }\n  .ptype.is-selected .sub { color: var(--pink); opacity: 0.85; }\n\n  /* ---------- price config card ---------- */\n  .config-card {\n    border: 1px solid var(--line);\n    border-radius: 12px;\n    padding: 16px;\n    display: flex;\n    flex-direction: column;\n    gap: 14px;\n  }\n  .price-input-wrap {\n    position: relative;\n    display: flex; align-items: center;\n    border: 1px solid var(--line);\n    border-radius: 8px;\n    padding: 10px 14px;\n  }\n  .price-input-wrap .prefix {\n    color: var(--ink-3);\n    font-size: 13px;\n    margin-right: 6px;\n  }\n  .price-input-wrap input {\n    border: 0;\n    outline: 0;\n    font-size: 20px;\n    font-weight: 500;\n    color: var(--ink);\n    font-family: inherit;\n    width: 100%;\n    background: transparent;\n  }\n  .config-label { font-size: 13px; color: var(--ink-2); }\n\n  /* ---------- customer-preview card ---------- */\n  .preview-card {\n    background: var(--surface);\n    border-radius: 12px;\n    padding: 14px;\n    display: flex;\n    flex-direction: column;\n    gap: 10px;\n  }\n  .preview-card .head {\n    font-size: 12px;\n    color: var(--ink-2);\n    display: flex; align-items: center; gap: 6px;\n  }\n  .preview-card .row {\n    display: flex; align-items: center; gap: 12px;\n  }\n  .preview-card .row .thumb {\n    width: 48px; height: 48px;\n    border-radius: 10px;\n    background: #3D1F6B center/cover no-repeat;\n    flex-shrink: 0;\n  }\n  .preview-card .row .name { font-size: 14px; font-weight: 600; }\n  .preview-card .row .price { font-size: 13px; color: var(--ink); margin-top: 2px; }\n\n  /* variation chips in preview */\n  .preview-chips {\n    display: flex; gap: 8px; flex-wrap: wrap;\n  }\n  .preview-chips .chip {\n    background: #fff;\n    border: 1px solid var(--line);\n    border-radius: 20px;\n    padding: 4px 12px 4px 4px;\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    font-size: 13px;\n  }\n  .preview-chips .chip .dot {\n    width: 26px; height: 26px;\n    border-radius: 50%;\n    background: #D1D5DB center/cover no-repeat;\n    flex-shrink: 0;\n  }\n  .preview-chips .chip .v-name { color: var(--ink); font-weight: 500; }\n  .preview-chips .chip .v-price { color: var(--pink); font-weight: 600; margin-left: 2px; }\n\n  /* ---------- variations grid (tela 2B) ---------- */\n  .var-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 10px;\n  }\n  .var-card {\n    border-radius: 12px;\n    overflow: hidden;\n    background: #fff;\n    border: 1px solid var(--line);\n    display: flex;\n    flex-direction: column;\n  }\n  .var-card .photo {\n    aspect-ratio: 4/3;\n    position: relative;\n    background: var(--bg-photo-empty);\n    background-size: cover;\n    background-position: center;\n    display: grid; place-items: center;\n  }\n  .var-card .photo.empty .placeholder {\n    display: flex; flex-direction: column; align-items: center; gap: 4px;\n    color: var(--ink-3);\n    font-size: 11px;\n  }\n  .var-card .photo .trash {\n    position: absolute;\n    top: 8px; right: 8px;\n    width: 28px; height: 28px;\n    border-radius: 50%;\n    background: rgba(255,255,255,0.85);\n    backdrop-filter: blur(4px);\n    border: 0;\n    display: grid; place-items: center;\n    cursor: pointer;\n    color: var(--ink);\n  }\n  .var-card .var-input {\n    border: 0;\n    border-top: 1px solid var(--line);\n    padding: 10px 12px;\n    font-size: 14px;\n    font-family: inherit;\n    outline: none;\n    color: var(--ink);\n    background: #fff;\n  }\n  .var-card .var-input.price {\n    color: var(--pink);\n    font-weight: 600;\n  }\n\n  .var-add {\n    border: 1.5px dashed var(--line-2);\n    border-radius: 12px;\n    background: transparent;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    gap: 4px;\n    color: var(--ink-3);\n    font-size: 13px;\n    cursor: pointer;\n    min-height: 240px;\n    font-family: inherit;\n  }\n  .var-add:hover { background: var(--surface); }\n\n  /* ---------- unit pills (tela 2C) ---------- */\n  .unit-pills {\n    display: grid;\n    grid-template-columns: 1fr 1fr 1fr;\n    gap: 8px;\n  }\n  .unit-pill {\n    border: 1px solid var(--line);\n    border-radius: 8px;\n    padding: 12px;\n    text-align: center;\n    font-size: 14px;\n    color: var(--ink-2);\n    background: #fff;\n    cursor: pointer;\n    font-family: inherit;\n    transition: all 0.12s ease;\n  }\n  .unit-pill.is-selected {\n    border: 2px solid var(--pink);\n    color: var(--pink);\n    background: var(--pink-soft);\n    font-weight: 500;\n  }\n\n  /* ---------- accordions (tela 3) ---------- */\n  .accordion {\n    border: 1px solid var(--line);\n    border-radius: 12px;\n    overflow: hidden;\n  }\n  .accordion .head {\n    padding: 14px 16px;\n    display: flex; align-items: center; gap: 12px;\n    cursor: pointer;\n    user-select: none;\n  }\n  .accordion .head .icon { color: var(--ink); flex-shrink: 0; }\n  .accordion .head .title { flex: 1; font-size: 15px; font-weight: 500; color: var(--ink); }\n  .accordion .head .chevron { color: var(--ink-2); transition: transform 0.2s ease; flex-shrink: 0; }\n  .accordion.is-open .chevron { transform: rotate(180deg); }\n  .accordion .body {\n    display: none;\n    padding: 0 16px 16px;\n    color: var(--ink-2);\n    font-size: 13px;\n    line-height: 1.5;\n    border-top: 1px solid var(--line);\n  }\n  .accordion .body p { margin: 12px 0 0; }\n  .accordion.is-open .body { display: block; }\n\n  .helper-text {\n    font-size: 14px;\n    color: var(--ink-2);\n    line-height: 1.45;\n  }\n\n  /* ---------- success banner       <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"divider\"><\u002Fdiv>\n\n      <div class=\"content\">\n        <div class=\"product-chip\">\n          <div class=\"thumb\" style=\"background-image:url(&quot;107a89be-85a2-4679-81fd-75c2289bea7b&quot;)\"><\u002Fdiv>\n          <div class=\"name\">Bowl Avelã<\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"helper-text\" style=\"margin:0\">Essas configurações são opcionais. Você pode pular e adicionar depois.<\u002Fp>\n\n        <div class=\"accordion\" onclick=\"toggleAccordion(this)\">\n          <div class=\"head\">\n            <div class=\"icon\"><svg width=\"20\" height=\"20\"><use href=\"#i-link\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n            <div class=\"title\">Complementos<\u002Fdiv>\n            <div class=\"chevron\"><svg width=\"18\" height=\"18\"><use href=\"#i-chev-down\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"body\"><p>Adicione opções como tamanhos extras, acompanhamentos ou personalizações que o cliente pode escolher no checkout.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"accordion\" onclick=\"toggleAccordion(this)\">\n          <div class=\"head\">\n            <div class=\"icon\"><svg width=\"20\" height=\"20\"><use href=\"#i-star\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n            <div class=\"title\">Pontos de fidelidade<\u002Fdiv>\n            <div class=\"chevron\"><svg width=\"18\" height=\"18\"><use href=\"#i-chev-down\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"body\"><p>Configure quantos pontos o cliente acumula ao comprar este produto e em quais campanhas ele participa.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"accordion\" onclick=\"toggleAccordion(this)\">\n          <div class=\"head\">\n            <div class=\"icon\"><svg width=\"20\" height=\"20\"><use href=\"#i-gear\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n            <div class=\"title\">Configurações avançadas<\u002Fdiv>\n            <div class=\"chevron\"><svg width=\"18\" height=\"18\"><use href=\"#i-chev-down\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"body\"><p>Controle estoque, prazo de preparo, regras de exibição e disponibilidade por horário.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"success-banner\">\n        <svg width=\"18\" height=\"18\"><use href=\"#i-check\"><\u002Fuse><\u002Fsvg>\n        <span>Produto salvo! Configure os extras quando quiser.<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"footer\">\n        <button class=\"btn-ghost\" type=\"button\" style=\"flex:1\" onclick=\"goTo(2)\">Voltar<\u002Fbutton>\n        <button class=\"btn-primary\" type=\"button\" style=\"flex:2\" onclick=\"goTo(4)\">Concluir cadastro<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n\n    <!-- ============================================================ -->\n    <!-- SCREEN 4 — Cadastro concluído -->\n    <!-- ============================================================ -->\n    <section class=\"screen\" data-screen-label=\"04 · Concluído\" id=\"screen-4\">\n      <div class=\"status-bar\">\n        <span>9:41<\u002Fspan>\n        <span class=\"right\">\n          <svg width=\"18\" height=\"12\"><use href=\"#i-signal\"><\u002Fuse><\u002Fsvg>\n          <svg width=\"16\" height=\"12\"><use href=\"#i-wifi\"><\u002Fuse><\u002Fsvg>\n          <svg width=\"26\" height=\"12\"><use href=\"#i-battery\"><\u002Fuse><\u002Fsvg>\n        <\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"header\">\n        <button class=\"back\" type=\"button\" aria-label=\"Voltar\" disabled=\"\" style=\"opacity:0.5; cursor:default\">\n          <svg width=\"22\" height=\"22\"><use href=\"#i-back\"><\u002Fuse><\u002Fsvg>\n        <\u002Fbutton>\n        <h1>Cadastro concluído<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"divider\"><\u002Fdiv>\n\n      <div class=\"content\" style=\"gap:22px\">\n        <div class=\"done-hero\">\n          <div class=\"done-circle\"><svg width=\"32\" height=\"32\"><use href=\"#i-check\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n          <h2>Produto cadastrado!<\u002Fh2>\n          <div class=\"sub\">Bowl Avelã já está disponível\nno seu cardápio digital.<\u002Fdiv>\n          <button type=\"button\" class=\"copy-link\" onclick=\"copyProductLink(this)\">\n            <svg width=\"18\" height=\"18\"><use href=\"#i-link\"><\u002Fuse><\u002Fsvg>\n            <span class=\"label\">Copiar link do produto<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"receipt\">\n          <div class=\"photo\" style=\"background-image:url(&quot;107a89be-85a2-4679-81fd-75c2289bea7b&quot;)\">\n            <span class=\"badge\"><svg width=\"12\" height=\"12\"><use href=\"#i-eye\"><\u002Fuse><\u002Fsvg> Visão do cliente<\u002Fspan>\n            <span class=\"price-tag\">R$ 20,00<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"body\">\n            <div class=\"name\">Bowl Avelã<\u002Fdiv>\n            <div class=\"cat\">Açaí<\u002Fdiv>\n            <div class=\"price\">R$ 20,00<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; flex-direction:column; gap:10px\">\n          <button class=\"btn-outline\" type=\"button\">\n            <svg width=\"18\" height=\"18\"><use href=\"#i-list\"><\u002Fuse><\u002Fsvg> Ver no cardápio\n          <\u002Fbutton>\n          <button class=\"btn-outline\" type=\"button\" onclick=\"restart()\">\n            <svg width=\"18\" height=\"18\"><use href=\"#i-plus\"><\u002Fuse><\u002Fsvg> Cadastrar outro produto\n          <\u002Fbutton>\n          <button class=\"btn-outline\" type=\"button\">\n            <svg width=\"18\" height=\"18\"><use href=\"#i-arrow-left\"><\u002Fuse><\u002Fsvg> Voltar ao painel\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // ---------- nav ----------\n  function goTo(n) {\n    document.querySelectorAll('.screen').forEach(s => s.classList.remove('is-active'));\n    const target = document.getElementById('screen-' + n);\n    target.classList.add('is-active');\n    // reset scroll of content\n    const c = target.querySelector('.content');\n    if (c) c.scrollTop = 0;\n  }\n  function restart() {\n    // clean any variations beyond default 2; reset to single price\n    selectPType('unico');\n    goTo(1);\n  }\n\n  // ---------- toggle switch ----------\n  function toggleSwitch(el) {\n    const on = el.classList.toggle('on');\n    el.setAttribute('aria-checked', on ? 'true' : 'false');\n    const row = el.closest('.toggle-row');\n    if (row) {\n      const state = row.querySelector('[data-state]');\n      if (state) state.textContent = on ? 'Ativado' : 'Desativado';\n    }\n  }\n\n  // ---------- description counter ----------\n  function updateCounter(t) {\n    document.getElementById('desc-count').textContent = t.value.length;\n  }\n\n  // ---------- price type selection ----------\n  function selectPType(kind) {\n    document.querySelectorAll('.ptype').forEach(p => {\n      p.classList.toggle('is-selected', p.dataset.ptype === kind);\n    });\n    document.querySelectorAll('[data-pview]').forEach(v => {\n      v.hidden = v.dataset.pview !== kind;\n    });\n    updateCustomerPreview(kind);\n  }\n\n  // ---------- unit pill ----------\n  function selectUnit(el) {\n    document.querySelectorAll('.unit-pill').forEach(p => p.classList.remove('is-selected'));\n    el.classList.add('is-selected');\n    updateCustomerPreview('medida');\n  }\n\n  // ---------- variations state ----------\n  // each: {name, price, photo|null}\n  const ACAI_IMG = (window.__resources && window.__resources.pequenaImg) || 'assets/pequena.webp';\n  let variations = [\n    { name: 'Pequena', price: '20,00', photo: ACAI_IMG },\n    { name: 'Média',   price: '28,00', photo: null }\n  ];\n\n  function renderVariations() {\n    const grid = document.getElementById('var-grid');\n    grid.innerHTML = '';\n    variations.forEach((v, idx) => {\n      const card = document.createElement('div');\n      card.className = 'var-card';\n      const hasPhoto = !!v.photo;\n      card.innerHTML = `\n        <div class=\"photo ${hasPhoto ? '' : 'empty'}\" ${hasPhoto ? `style=\"background-image:url('${v.photo}')\"` : ''}>\n          ${hasPhoto ? '' : `\n            <div class=\"placeholder\">\n              <svg width=\"28\" height=\"28\"><use href=\"#i-imgplus\"/><\u002Fsvg>\n              <span>Adicionar foto<\u002Fspan>\n            <\u002Fdiv>`}\n          <button type=\"button\" class=\"trash\" aria-label=\"Remover\" onclick=\"removeVariation(${idx}); event.stopPropagation();\">\n            <svg width=\"16\" height=\"16\"><use href=\"#i-trash\"/><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fdiv>\n        <input class=\"var-input\" type=\"text\" value=\"${v.name}\" oninput=\"updateVar(${idx}, 'name', this.value)\" />\n        <div style=\"display:flex; align-items:center; border-top:1px solid var(--line); padding:0 12px\">\n          <span style=\"color:var(--ink-3); font-size:13px; margin-right:6px\">R$<\u002Fspan>\n          <input class=\"var-input price\" type=\"text\" value=\"${v.price}\" oninput=\"updateVar(${idx}, 'price', this.value)\" style=\"border:0; padding:10px 0; flex:1\" />\n        <\u002Fdiv>\n      `;\n      grid.appendChild(card);\n    });\n    // Add-card\n    const add = document.createElement('button');\n    add.type = 'button';\n    add.className = 'var-add';\n    add.innerHTML = `\n      <svg width=\"22\" height=\"22\"><use href=\"#i-plus\"/><\u002Fsvg>\n      <span>Adicionar<\u002Fspan>\n    `;\n    add.onclick = addVariation;\n    grid.appendChild(add);\n    updateCustomerPreview('variacao');\n  }\n\n  function addVariation() {\n    variations.push({ name: '', price: '', photo: null });\n    renderVariations();\n  }\n  function removeVariation(i) {\n    variations.splice(i, 1);\n    renderVariations();\n  }\n  function updateVar(i, key, val) {\n    variations[i][key] = val;\n    updateCustomerPreview('variacao');\n  }\n\n  // ---------- customer preview ----------\n  function updateCustomerPreview(kind) {\n    const single = document.getElementById('cp-single');\n    const multi  = document.getElementById('cp-variations');\n    const price  = document.getElementById('cp-price');\n\n    if (kind === 'variacao') {\n      single.hidden = true;\n      multi.hidden = false;\n      const chips = document.getElementById('cp-chips');\n      chips.innerHTML = '';\n      variations.forEach(v => {\n        if (!v.name && !v.price) return;\n        const chip = document.createElement('span');\n        chip.className = 'chip';\n        const dot = v.photo\n          ? `<span class=\"dot\" style=\"background-image:url('${v.photo}')\"><\u002Fspan>`\n          : `<span class=\"dot\"><\u002Fspan>`;\n        chip.innerHTML = `\n          ${dot}\n          <span class=\"v-name\">${v.name || '—'}<\u002Fspan>\n          <span class=\"v-price\">R$ ${v.price || '0,00'}<\u002Fspan>\n        `;\n        chips.appendChild(chip);\n      });\n    } else {\n      single.hidden = false;\n      multi.hidden = true;\n      if (kind === 'medida') {\n        const sel = document.querySelector('.unit-pill.is-selected');\n        const unit = sel ? sel.dataset.unit : 'kg';\n        price.textContent = `R$ 40,00/${unit}`;\n      } else {\n        price.textContent = 'R$ 40,00';\n      }\n    }\n  }\n\n  // ---------- accordion ----------\n  function toggleAccordion(el) {\n    el.classList.toggle('is-open');\n  }\n\n  // ---------- copy link ----------\n  function copyProductLink(btn) {\n    const url = 'https://diggy.app/cardapio/bowl-avela';\n    const label = btn.querySelector('.label');\n    const icon = btn.querySelector('svg use');\n    const done = () => {\n      btn.classList.add('is-copied');\n      const prev = label.textContent;\n      label.textContent = 'Link copiado!';\n      icon.setAttribute('href', '#i-check');\n      setTimeout(() => {\n        btn.classList.remove('is-copied');\n        label.textContent = prev;\n        icon.setAttribute('href', '#i-link');\n      }, 1800);\n    };\n    if (navigator.clipboard && navigator.clipboard.writeText) {\n      navigator.clipboard.writeText(url).then(done, done);\n    } else {\n      done();\n    }\n  }\n\n  // initial render\n  renderVariations();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
